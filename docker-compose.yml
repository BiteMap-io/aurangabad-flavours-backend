services:
  backend:
    build: .
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/aurangabad
    depends_on:
      - mongodb
    networks:
      - app-network

  mongodb:
    image: mongo:4.4
    container_name: aurangabad-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
